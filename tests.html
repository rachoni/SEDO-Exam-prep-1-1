<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator Tests</title>
  <link rel="stylesheet" href="https://code.jquery.com/qunit/qunit-2.19.4.css">
</head>
<body>
  <div id="qunit"></div>
  <div id="qunit-fixture">
    <input id="a" type="text" title="Input Number A">
    <input id="b" type="text" title="Input Number B">
    <input id="a" type="text" title="Input A">
    <input id="b" type="text" title="Input B">
    <button id="btn-subtract">Subtract</button>
    <span id="result"></span>
  </div>

  <script src="https://code.jquery.com/qunit/qunit-2.19.4.js"></script>
  <script src="script.js"></script>
  <script>
    QUnit.module('Calculator functions');

    QUnit.test('add()', assert => {
      assert.equal(add(2, 3), 5, '2 + 3 = 5');
      assert.equal(add(-1, 1), 0, '-1 + 1 = 0');
    });

    QUnit.test('subtract()', assert => {
      assert.equal(subtract(5, 3), 2, '5 - 3 = 2');
      assert.equal(subtract(0, 4), -4, '0 - 4 = -4');
    });

    QUnit.test('multiply()', assert => {
      assert.equal(multiply(2, 3), 6, '2 × 3 = 6');
    });

    QUnit.test('subtract with empty inputs', assert => {

      // Re-initialize event handlers for dynamically created QUnit fixture elements
      init();

      // 1. Извикваме init() ТУК, за да закачим събитията на новосъздадените от QUnit бутони
      init();
      
      document.getElementById('a').value = '';
      document.getElementById('b').value = '';
      document.getElementById('btn-subtract').click();
      assert.equal(
        document.getElementById('result').textContent,
        'Please fill both inputs',
        'Shows warning if inputs are empty'
      );
      assert.equal(multiply(-2, 3), -6, '-2 × 3 = -6');
      assert.equal(multiply(2.5, 2), 5, '2.5 × 2 = 5');
    });
  </script>
</body>
